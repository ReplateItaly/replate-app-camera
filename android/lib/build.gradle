def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["ReplateCamera_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["ReplateCamera_" + name]).toInteger()
}

android {
  namespace "com.replatecamera"
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")
  buildToolsVersion getExtOrDefault("buildToolsVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    consumerProguardFiles 'proguard-rules.pro'
  }

  sourceSets {
    main {
      java.srcDirs = ['../app/src/main/java/com/replatecamera']
      kotlin.srcDirs = ['../app/src/main/java/com/replatecamera']
      manifest.srcFile 'src/main/AndroidManifest.xml'
    }
  }

  buildTypes {
    release { minifyEnabled false }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  mavenCentral()
  google()
  maven { url 'https://www.jitpack.io' }
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation 'com.google.ar:core:1.31.0'
  implementation 'com.gorisse.thomas.sceneform:sceneform:1.23.0'
  implementation 'com.gorisse.thomas.sceneform:ux:1.23.0'
  implementation("androidx.exifinterface:exifinterface:1.3.7")
  implementation "androidx.lifecycle:lifecycle-process:2.8.5"
  implementation 'com.google.android.material:material:1.12.0'
}
